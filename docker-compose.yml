services:
  platform-mock:
    image: mockoon/cli:9.2.0
    container_name: platform-mock
    command:
      - --data
      - /data/platform-mock.json
      - --port
      - "3000"
      - --hostname
      - 0.0.0.0
    volumes:
      - ./mockoon/platform-mock.json:/data/platform-mock.json:ro,z
    ports:
      - "8080:3000"
