spring.application.name=wifi-admin-service
server.port=8081
soap.endpoint.url=http://localhost:8080/platform


logging.level.org.springframework.ws.client.MessageTracing.received=TRACE
logging.level.org.springframework.ws.client.MessageTracing.sent=TRACE

spring.datasource.url=jdbc:postgresql://localhost:5432/wifi_admin_db
spring.datasource.username=wifi_admin_user
spring.datasource.password=wifi_admin_user
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false