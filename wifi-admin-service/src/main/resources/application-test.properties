server.port=0

spring.datasource.url=jdbc:h2:mem:wifiadmin;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

logging.level.root=WARN
logging.level.com.ht_rnd.wifi_admin_service=INFO
logging.level.org.springframework.ws.client.MessageTracing=OFF

wifi.sync.enabled=false
wifi.sync.initial-delay-ms=60000
wifi.sync.fixed-delay-ms=60000

management.endpoints.web.exposure.include=health,info

app.security.username=test
app.security.password=test123